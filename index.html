<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang bio của tuiiiiii</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(120deg, #ff0000, #0000ff, #800080);
            background-size: 200% 200%;
            animation: gradient 10s ease infinite;
        }
        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .navbar .menu-icon,
        .navbar .search-icon {
            width: 30px;
            height: 30px;
            cursor: pointer;
        }
        .navbar .menu-icon {
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/b/b2/Hamburger_icon.svg');
            background-size: cover;
        }
        .navbar .search-icon {
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/5/55/Magnifying_glass_icon.svg');
            background-size: cover;
        }
        .container {
            max-width: 600px;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        h1 {
            font-weight: 700;
            color: #e73c7e;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        p {
            color: #333;
            font-weight: 400;
            font-size: 1.1em;
            max-width: 80%;
            margin: 0 auto 20px;
        }
        .social-icons {
            margin-top: 20px;
        }
        .social-icons a {
            display: inline-block;
            margin: 0 10px;
            transition: transform 0.3s ease;
        }
        .social-icons a:hover {
            transform: scale(1.2);
        }
        .social-icons img {
            width: 40px;
            height: 40px;
            border-radius: 10px; /* Thêm bo tròn góc */
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="menu-icon"></div>
        <div class="search-icon"></div>
    </div>
    <div class="container">
        <img src="https://raw.githubusercontent.com/vinzcyun/vinzcyun.github.io/main/IMG_20240714_122355.webp" alt="Avatar" class="avatar">
        <h1>wyn</h1>
        <p>hmmmmmmmmmmmmm.</p>
        <div class="social-icons">
            <a href="https://facebook.com/username" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/2023_Facebook_icon.svg" alt="Facebook"></a>
            <a href="https://t.me/username" target="_blank"><img src="https://telegram.org/img/t_logo.png" alt="Telegram"></a>
            <a href="https://github.com/username" target="_blank"><img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="GitHub"></a>
            <a href="https://m.me/username" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Facebook_Messenger_4_Logo.png" alt="Messenger"></a>
        </div>
    </div>

    <script>
        window.onload = function() {
            setTimeout(function() {
                var container = document.querySelector('.container');
                container.style.opacity = '1';
                container.style.transform = 'scale(1)';
            }, 100);
        }
    </script>
</body>
</html>
